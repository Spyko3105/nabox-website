<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 Fitness Analytics</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>💪 Coach Connect</h1>
    
    <div class="container">
        <div class="card">
            <h2>Nouvelle Séance</h2>
            <div class="grid-form">
                <input type="text" id="exercice" placeholder="Exercice (ex: Développé couché)">
                <input type="number" id="poids" placeholder="Poids (kg)">
                <input type="number" id="reps" placeholder="Répétitions">
                <button onclick="addSession()">Enregistrer</button>
            </div>
        </div>

        <div class="card">
            <h2>Progression</h2>
            <canvas id="fitnessChart"></canvas>
            <p>Total séances : <span id="total">0</span></p>
        </div>

        <div class="card">
            <h2>Historique</h2>
            <ul id="list"></ul>
            <button class="btn-danger" onclick="clearAll()">Réinitialiser</button>
        </div>
    </div>

    <script>
        let myChart;

        const getData = () => JSON.parse(localStorage.getItem('fitness_v3')) || [];
        
        function updateChart() {
            const data = getData();
            const ctx = document.getElementById('fitnessChart').getContext('2d');
            
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(i => i.date.split(' ')[0]),
                    datasets: [{
                        label: 'Évolution du Poids (kg)',
                        data: data.map(i => i.poids),
                        borderColor: '#22c55e',
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(34, 197, 94, 0.1)'
                    }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: false } } }
            });
        }

        function addSession() {
            const ex = document.getElementById('exercice').value;
            const p = document.getElementById('poids').value;
            const r = document.getElementById('reps').value;

            if (!ex || !p || !r) return alert("Champs vides !");

            const data = getData();
            data.push({ 
                exercice: ex, 
                poids: parseFloat(p), 
                reps: r, 
                date: new Date().toLocaleDateString() 
            });
            
            localStorage.setItem('fitness_v3', JSON.stringify(data));
            display();
        }

        function clearAll() {
            if (confirm("Effacer tout ?")) {
                localStorage.removeItem('fitness_v3');
                display();
            }
        }

        function display() {
            const list = document.getElementById('list');
            const data = getData();
            document.getElementById('total').textContent = data.length;
            list.innerHTML = data.reverse().map(item => `
                <li>
                    <strong>${item.exercice}</strong> : ${item.poids}kg x ${item.reps}<br>
                    <small>${item.date}</small>
                </li>
            `).join('');
            updateChart();
        }

        window.onload = display;
    </script>
</body>
</html>
