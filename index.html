<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Suivi Entraînement</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }
    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body><h1>💪 Suivi Entraînement</h1><div class="card">
  <h2>Ajouter une séance</h2>
  <input type="text" id="jour" placeholder="Jour (ex: Lundi)">
  <input type="text" id="exercice" placeholder="Exercice">
  <input type="number" id="reps" placeholder="Répétitions">
  <button onclick="addSession()">Ajouter</button>
</div><div class="card">
  <h2>Historique</h2>
  <ul id="list"></ul>
</div><script>
function addSession() {
  const jour = document.getElementById('jour').value;
  const exercice = document.getElementById('exercice').value;
  const reps = document.getElementById('reps').value;

  if (!jour || !exercice || !reps) return alert("Remplis tout !");

  const data = JSON.parse(localStorage.getItem('training')) || [];
  data.push({ jour, exercice, reps });
  localStorage.setItem('training', JSON.stringify(data));

  display();
}

function display() {
  const list = document.getElementById('list');
  list.innerHTML = "";

  const data = JSON.parse(localStorage.getItem('training')) || [];
  data.forEach((item, index) => {
    const li = document.createElement('li');
    li.textContent = `${item.jour} - ${item.exercice} : ${item.reps} reps`;
    list.appendChild(li);
  });
}

window.onload = display;
</script></body>
</html>
